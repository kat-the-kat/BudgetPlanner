<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planner - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background-color: #f8f9fa;
      color: #212529;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #212529;
    }

    p {
      font-size: 16px;
      color: #6c757d;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      background-color: #007bff;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .button:hover {
      background-color: #0056b3;
    }

    .info {
      background-color: #e7f3ff;
      border-left: 4px solid #007bff;
      padding: 16px;
      margin-top: 24px;
      border-radius: 4px;
      text-align: left;
    }

    .info h3 {
      font-size: 14px;
      color: #007bff;
      margin-bottom: 8px;
    }

    .info p {
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      Budget Planner is currently offline, but your budget data is safely stored on your device.
    </p>
    <button class="button" onclick="window.location.href='/'">Try Again</button>

    <div class="info">
      <h3>💡 Good News!</h3>
      <p>
        Your budget data is automatically saved to your device. When you're back online,
        Budget Planner will be fully functional.
      </p>
    </div>
  </div>
</body>
</html>
