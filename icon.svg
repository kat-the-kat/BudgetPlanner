<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#007bff" rx="45"/>

  <!-- Rounded corners overlay for modern look -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0056b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007bff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dollar sign symbol -->
  <g fill="white">
    <!-- Vertical line of dollar sign -->
    <rect x="85" y="45" width="22" height="102" rx="5"/>

    <!-- Top curve -->
    <path d="M 60 60 Q 60 50 75 50 Q 90 50 95 55 L 95 65 Q 85 65 75 65 Q 65 65 65 75 Q 65 85 75 85 L 110 85 Q 120 85 120 75 L 130 75 Q 130 95 110 100 L 110 110 Q 130 110 130 120 L 120 120 Q 120 115 110 115 L 75 115 Q 65 115 65 125 Q 65 135 75 135 Q 90 135 95 130 L 95 142 Q 75 147 60 142" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Simple bars representing budget chart -->
    <rect x="50" y="150" width="12" height="25" rx="2" fill="white" opacity="0.9"/>
    <rect x="70" y="138" width="12" height="37" rx="2" fill="white" opacity="0.9"/>
    <rect x="90" y="130" width="12" height="45" rx="2" fill="white" opacity="0.9"/>
    <rect x="110" y="145" width="12" height="30" rx="2" fill="white" opacity="0.9"/>
    <rect x="130" y="155" width="12" height="20" rx="2" fill="white" opacity="0.9"/>
  </g>
</svg>